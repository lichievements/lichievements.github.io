<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>lichievements</title>
  <meta name="description" content="Log in with Lichess and discover the achievements hidden in your games." />
  <link rel="icon" type="image/png" href="icon.png" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#17130f" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="mobile-web-app-capable" content="yes" />
  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="lichievements" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <link rel="preload" href="fonts/Inter-4.1/web/InterVariable.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="css/fonts.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script>
    // Set the theme before first paint to avoid a flash.
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var theme = saved || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="wrap">
    <header class="site-header">
      <h1 class="logo"><strong>li</strong><span class="thin">chievements</span></h1>
      <p class="tagline">Log in with Lichess and uncover the achievements hidden across your games.</p>

      <button id="login-btn" class="btn btn-primary" type="button">
        <svg class="logo-mark" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9.75v6.75m0 0-3-3m3 3 3-3m-8.25 6a4.5 4.5 0 0 1-1.41-8.775 5.25 5.25 0 0 1 10.233-2.33 3 3 0 0 1 3.758 3.848A3.752 3.752 0 0 1 18 19.5H6.75Z" />
        </svg>
        Log in with Lichess
      </button>

      <div id="statusbar" class="statusbar" hidden>
        <span class="user" id="status-user"></span>
        <span id="status-summary"></span>
        <span class="count-wrap"><span class="count"><span id="status-unlocked">0</span> / <span id="status-total">0</span></span> <span class="count-label">unlocked</span></span>
        <div class="progress indeterminate" id="progress" hidden><span id="progress-bar"></span></div>
        <div class="statusbar-actions">
          <button id="reload-btn" class="btn btn-ghost" type="button" hidden>Reload</button>
          <button id="logout-btn" class="btn btn-ghost" type="button">Log out</button>
        </div>
      </div>
    </header>

    <div id="error" class="error" hidden></div>

    <main id="grid-root" aria-live="polite"></main>

    <div class="theme-switch-row">
      <button id="theme-toggle" class="icon-btn theme-toggle" type="button" title="Toggle light / dark theme" aria-label="Toggle light or dark theme">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4" />
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
        </svg>
      </button>
      <a class="icon-btn" href="https://github.com/lichievements/lichievements.github.io" target="_blank" rel="noopener" title="View the source code on GitHub" aria-label="View the source code on GitHub">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
        </svg>
      </a>
    </div>

    <footer class="site-footer">
      <p>Not affiliated with Lichess. Your games are analysed entirely in your browser and never leave your device.
        Built on the <a href="https://lichess.org/api" target="_blank" rel="noopener">Lichess API</a>.</p>
      <p>Icons by <a href="https://heroicons.com" target="_blank" rel="noopener">Heroicons</a>.</p>
    </footer>
  </div>

  <script type="module" src="js/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
